<!DOCTYPE html>
<html>

<head>
  <!--
    如果你的 Web 应用不是部署在根路径下，请修改下面的 href 值，
    使其与实际的基础路径一致。

    下面提供的路径必须以 "/" 开头并以 "/" 结尾，
    这样才能正常工作。

    更多详情：
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    这里是 base href 的占位符，它会在 `flutter build` 时被 `--base-href`
    参数的值替换。
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS 元标签与图标 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="suisui_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- 网站图标 -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>suisui_app</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <!--
    你可以自定义 "flutter_bootstrap.js" 脚本。
    这对于向 Flutter 加载器提供自定义配置，
    或在初始化过程中向用户反馈状态都很有用。

    更多详情：
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
